name: Check documentation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax check code blocks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check bash and JSON syntax
        run: ./scripts/check-code-blocks.sh

  sdk-validation:
    name: Validate SDK references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: cachix/install-nix-action@v30

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Validate hl CLI commands
        run: nix develop --command python scripts/check-hl-commands.py

      - name: Validate Python code blocks
        run: nix develop --command python scripts/check-python-blocks.py
