name: Check documentation

# Disabled until self-hosted runners are available for this repo.
# Run locally with: nix develop --command bash -c './scripts/check-code-blocks.sh && python scripts/check-hl-commands.py && python scripts/check-python-blocks.py'
on:
  workflow_dispatch:

jobs:
  syntax-check:
    name: Syntax check code blocks
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check bash and JSON syntax
        run: ./scripts/check-code-blocks.sh

  sdk-validation:
    name: Validate SDK references
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Validate hl CLI commands
        run: nix develop --command python scripts/check-hl-commands.py

      - name: Validate Python code blocks
        run: nix develop --command python scripts/check-python-blocks.py

  build:
    name: Build site
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build site
        run: nix develop --command zola build
