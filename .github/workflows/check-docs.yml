name: Check documentation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax check code blocks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check bash and JSON syntax
        run: ./scripts/check-code-blocks.sh

  sdk-validation:
    name: Validate SDK references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv-check
          key: venv-${{ runner.os }}-${{ hashFiles('scripts/check-hl-commands.py', 'scripts/check-python-blocks.py') }}

      - name: Setup venv
        run: |
          if [ ! -d .venv-check ]; then python3 -m venv .venv-check; fi
          source .venv-check/bin/activate
          pip install -q highlighter-sdk pyright

      - name: Validate hl CLI commands
        run: |
          source .venv-check/bin/activate
          python scripts/check-hl-commands.py

      - name: Validate Python code blocks
        run: |
          source .venv-check/bin/activate
          python scripts/check-python-blocks.py
